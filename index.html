<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hearing Loss Demonstration</title>
  <link rel="stylesheet" href="css/demo.css">
</head>
<body>
  <div id="app">
    <!-- Header -->
    <header class="header">
      <h1 class="header-title">Hearing Loss Demo</h1>
      <button id="btn-mic" class="btn btn-mic-hero">&#x1F3A4; Use Microphone</button>
      <span class="header-hint">Space: Play/Stop &middot; F: Toggle Mode</span>
    </header>

    <!-- Setup Panel -->
    <section class="setup-panel">
      <div class="setup-row">
        <div class="setup-group">
          <span class="setup-label">Audio</span>
          <input type="file" id="audio-input" accept="audio/*" hidden>
          <button id="btn-load" class="btn btn-outline">Load File</button>
          <span id="file-name" class="file-name">Built-in demo sample</span>
        </div>
        <div class="setup-group">
          <button id="btn-play" class="btn btn-play" disabled>Play</button>
          <button id="btn-stop" class="btn btn-stop" disabled>Stop</button>
        </div>
      </div>

      <div class="setup-row">
        <span class="setup-label">Profile</span>
        <div class="preset-bar">
          <button class="btn-preset" data-preset="mild">Mild</button>
          <button class="btn-preset" data-preset="moderate">Moderate</button>
          <button class="btn-preset" data-preset="severe">Severe</button>
          <button class="btn-preset" data-preset="profound">Profound</button>
          <button class="btn-preset" data-preset="presbycusis">Age-Related</button>
          <button class="btn-preset" data-preset="noise_induced">Noise-Induced</button>
          <button class="btn-preset" data-preset="custom">Custom</button>
        </div>
      </div>

      <div id="audiogram-panel" class="audiogram-entry hidden">
        <div class="threshold-row">
          <div class="freq-input"><label>125 Hz</label><input type="number" id="thr-125" value="25" min="0" max="120" step="5"></div>
          <div class="freq-input"><label>250 Hz</label><input type="number" id="thr-250" value="30" min="0" max="120" step="5"></div>
          <div class="freq-input"><label>500 Hz</label><input type="number" id="thr-500" value="40" min="0" max="120" step="5"></div>
          <div class="freq-input"><label>1 kHz</label><input type="number" id="thr-1000" value="50" min="0" max="120" step="5"></div>
          <div class="freq-input"><label>2 kHz</label><input type="number" id="thr-2000" value="60" min="0" max="120" step="5"></div>
          <div class="freq-input"><label>4 kHz</label><input type="number" id="thr-4000" value="70" min="0" max="120" step="5"></div>
          <div class="freq-input"><label>8 kHz</label><input type="number" id="thr-8000" value="75" min="0" max="120" step="5"></div>
        </div>
      </div>
    </section>

    <!-- Mode Toggle -->
    <div class="mode-section">
      <div class="mode-toggle">
        <button id="btn-full" class="mode-btn mode-full active">Normal Hearing</button>
        <button id="btn-filtered" class="mode-btn mode-filtered">Your Hearing</button>
      </div>
      <div id="preset-description" class="preset-description"></div>
    </div>

    <!-- Spectrogram Display -->
    <main class="main-display">
      <div class="canvas-container">
        <canvas id="spectrogram"></canvas>
        <canvas id="overlay"></canvas>
        <div id="drop-zone" class="drop-zone">
          <div class="drop-content">
            <div class="drop-icon">&#9835;</div>
            <p>Press Play to hear the built-in demo</p>
            <span>or drop an audio file here</span>
          </div>
        </div>
      </div>

      <!-- Level Meter -->
      <div class="level-meter">
        <span class="meter-label">Output</span>
        <div class="meter-track">
          <div id="level-fill" class="meter-fill"></div>
        </div>
        <span id="level-value" class="meter-value">-- dBFS</span>
        <span id="level-warning" class="meter-warning hidden">&#x26A0;</span>
        <span class="safety-label">Safety:</span>
        <input type="range" id="safety-threshold" min="-40" max="-10" value="-20" step="1" class="safety-slider">
        <span id="threshold-value" class="threshold-value">-20 dBFS</span>
      </div>
    </main>

    <!-- Band Controls -->
    <section class="band-section">
      <div class="bands-row">
        <div class="band-card" data-freq="125">
          <span class="band-freq">125</span>
          <label class="toggle"><input type="checkbox" checked id="band-125"><span class="toggle-track"></span></label>
          <span class="band-atten" id="att-125">0 dB</span>
        </div>
        <div class="band-card" data-freq="250">
          <span class="band-freq">250</span>
          <label class="toggle"><input type="checkbox" checked id="band-250"><span class="toggle-track"></span></label>
          <span class="band-atten" id="att-250">0 dB</span>
        </div>
        <div class="band-card" data-freq="500">
          <span class="band-freq">500</span>
          <label class="toggle"><input type="checkbox" checked id="band-500"><span class="toggle-track"></span></label>
          <span class="band-atten" id="att-500">0 dB</span>
        </div>
        <div class="band-card" data-freq="1000">
          <span class="band-freq">1k</span>
          <label class="toggle"><input type="checkbox" checked id="band-1000"><span class="toggle-track"></span></label>
          <span class="band-atten" id="att-1000">0 dB</span>
        </div>
        <div class="band-card" data-freq="2000">
          <span class="band-freq">2k</span>
          <label class="toggle"><input type="checkbox" checked id="band-2000"><span class="toggle-track"></span></label>
          <span class="band-atten" id="att-2000">0 dB</span>
        </div>
        <div class="band-card" data-freq="4000">
          <span class="band-freq">4k</span>
          <label class="toggle"><input type="checkbox" checked id="band-4000"><span class="toggle-track"></span></label>
          <span class="band-atten" id="att-4000">0 dB</span>
        </div>
        <div class="band-card" data-freq="8000">
          <span class="band-freq">8k</span>
          <label class="toggle"><input type="checkbox" checked id="band-8000"><span class="toggle-track"></span></label>
          <span class="band-atten" id="att-8000">0 dB</span>
        </div>
      </div>
      <div class="volume-row">
        <label class="volume-label">Volume</label>
        <input type="range" id="master-volume" min="0" max="100" value="50" class="volume-slider">
        <span id="volume-value" class="volume-value">50%</span>
      </div>
    </section>
  </div>

  <script src="js/presets.js"></script>
  <script src="js/audio-engine.js"></script>
  <script src="js/filter-bank.js"></script>
  <script src="js/safety-chain.js"></script>
  <script src="js/spectrogram.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
